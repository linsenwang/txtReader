<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>txtReader</title>
    <link rel="stylesheet" href="lib/katex.min.css">
    <link rel="icon" type="image/x-icon" href="web_icon/yanan.png" />
    <link rel="stylesheet" type="text/css" href="afdian_styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#fff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1F2020" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="txtReader">
    <link rel="apple-touch-icon" href="web_icon/yanan_with_border.png">
    <link rel="manifest" href="manifest.json">
    <style>
        @font-face {
            font-family: 'SarasaMonoSC';
            src: local('Sarasa Mono SC'), 
                 local('SarasaMonoSC'),
                 local('Sarasa Mono SC Regular'),
                 url('/fonts/SarasaMonoSC-Regular.ttf') format('truetype');
            font-display: swap;
        }
        
        body {
            font-family: 'SarasaMonoSC', Arial, sans-serif;
        }
        
        /* 样式代码 */
        .back-link {
            margin-bottom: 20px;
        }
        .back-link a {
            text-decoration: none;
            color: #007BFF;
            font-size: 16px;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .content {
            overflow: hidden;
            margin: auto;
        }
        
        /* 翻页模式样式 */
        .content.paginated {
            height: calc(100vh - 60px);
            overflow: hidden;
            position: relative;
        }
        
        .content.paginated .page {
            height: 100%;
            overflow: visible;
            padding: 10px 0;
            box-sizing: border-box;
            display: none;
            font-size: 18px;
            flex-direction: column;
            justify-content: center;
        }
        
        .content.paginated .page.active {
            display: flex;
        }
        
        /* 页面点击翻页区域 */
        .page-click-area {
            position: absolute;
            top: 0;
            width: 30%;
            height: 100%;
            cursor: pointer;
            z-index: 100;
            opacity: 0;
        }
        
        .page-click-area.left {
            left: 0;
        }
        
        .page-click-area.right {
            right: 0;
        }
        
        /* 翻页模式下覆盖 body 的大 margin */
        body.paginated-mode {
            margin: 1em auto !important;
            max-width: 25em;
        }
        
        /* 翻页模式下段落的 margin 调整 */
        .content.paginated .page p {
            margin: 0.3em 0;
        }
        
        /* 被切分的段落，第一部分的底部没有 margin */
        .content.paginated .page p.split-end {
            margin-bottom: 0;
        }
        
        /* 被切分的段落，第二部分的顶部没有 margin */
        .content.paginated .page p.split-start {
            margin-top: 0;
        }
        
        /* 分页控制按钮 - 右下角 */
        .page-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        
        .page-controls:hover {
            opacity: 1;
        }
        
        .page-btn {
            height: 40px;
            width: 40px;
            background-color: rgba(255, 255, 255, 0);
            border-radius: 40px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        
        .page-btn img {
            height: 1.2em;
            width: 1.2em;
            opacity: 0.7;
        }
        
        .page-btn:hover img {
            opacity: 1;
        }
        
        .page-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }
        
        .page-info {
            font-size: 14px;
            min-width: 60px;
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 6px 10px;
            border-radius: 20px;
        }
        
        @media (prefers-color-scheme: dark) {
            .page-info {
                background: rgba(40, 40, 40, 0.8);
            }
        }
        
        .mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            height: 40px;
            width: 40px;
            background-color: rgba(255, 255, 255, 0);
            border-radius: 40px;
            border: none;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .mode-toggle img {
            height: 1.2em;
            width: 1.2em;
            opacity: 0.7;
        }
        
        .mode-toggle:hover {
            opacity: 1;
        }
        
        /* body:hover .mode-toggle {
            opacity: 1;
        } */
        
        #forceUpdateButton {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 999;
            height: 40px;
            width: 40px;
            background-color: rgba(255, 255, 255, 0);
            border-radius: 40px;
            border: none;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        #forceUpdateButton:hover {
            opacity: 1;
        }

        .custom-toast {
            position: fixed;
            top: 20px;
            right: 70px;
            background: #00000005;
            backdrop-filter: blur(10px);
            padding: 5px 8px;
            border-radius: 6px;
            font-size: 12px;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <button id="forceUpdateButton" title="刷新位置"><img src="web_icon/refresh.svg" style="height: 1.2em; width: 1.2em; margin: -0.24em 0.5em;"></button>
    <button id="modeToggle" class="mode-toggle" title="切换翻页/滚动模式"><img src="web_icon/epub.svg" style="height: 1.2em; width: 1.2em; margin: -0.24em 0.5em;"></button>
    
    <!-- 返回链接 -->
    <div class="back-link">
        <!-- <a href="index.html">← 返回文件列表</a> -->
    </div>

    <!-- 渲染后的内容 -->
    <div class="content" id="content">
        <!-- 渲染后的内容将会插入在这里 -->
    </div>
    
    <!-- 页面点击翻页区域 -->
    <div class="page-click-area left" id="clickAreaLeft" title="上一页"></div>
    <div class="page-click-area right" id="clickAreaRight" title="下一页"></div>
    
    <!-- 分页控制 - 右下角 -->
    <div class="page-controls" id="pageControls" style="display: none;">
        <button class="page-btn" id="prevPage" title="上一页 (←)"><img src="web_icon/arrow.svg"></button>
        <span class="page-info" id="pageInfo">1 / 1</span>
        <button class="page-btn" id="nextPage" title="下一页 (→)"><img src="web_icon/arrow.svg" style="transform: rotate(180deg);"></button>
    </div>

    <!-- 引入必要的库 -->
    <script src="lib/marked.min.js"></script>
    <script src="lib/katex.min.js"></script>
    <script src="lib/auto-render.min.js"></script>

    <script type="module">
    // 服务器配置
    const SERVER_CONFIG = {
        progressOnly: false,
        remoteServerUrl: ''
    };

    // 获取服务器配置
    async function loadServerConfig() {
        try {
            const response = await fetch('/server-config');
            if (response.ok) {
                const config = await response.json();
                SERVER_CONFIG.progressOnly = config.progressOnly;
                SERVER_CONFIG.remoteServerUrl = config.remoteServerUrl;
                console.log('服务器配置:', SERVER_CONFIG);
            }
        } catch (error) {
            console.log('获取服务器配置失败，使用默认配置:', error);
        }
    }

    // 页面加载时获取配置
    loadServerConfig();

    var fileName = '';
    
    // 阅读模式状态
    let isPaginated = localStorage.getItem('readingMode') === 'paginated';
    let currentPage = 1;
    let totalPages = 1;
    let pages = [];
    
    // EPUB 分段加载管理
    const EPUB_LOADER = {
        isEpub: false,
        totalParagraphs: 0,
        loadedRanges: [], // 已加载的段落范围 [{start, end}]
        loadingRanges: new Set(), // 正在加载的范围
        pendingStartParagraph: null, // 优先加载的起始段落
        batchSize: 50, // 每批加载的段落数
        preloadThreshold: 20, // 距离边界多少段落时预加载
        isLoading: false,
        chapterMap: [], // 章节映射信息
        
        // 检查某段落是否已加载
        isParagraphLoaded(index) {
            return this.loadedRanges.some(r => index >= r.start && index <= r.end);
        },
        
        // 获取下一个需要向后加载的起始段落
        getNextLoadStartForward() {
            // 找到当前已加载范围的最后一个，继续往后加载
            if (this.loadedRanges.length === 0) {
                return 0;
            }
            
            // 按起始位置排序
            const sorted = [...this.loadedRanges].sort((a, b) => a.start - b.start);
            const lastRange = sorted[sorted.length - 1];
            
            if (lastRange.end >= this.totalParagraphs - 1) {
                return -1; // 全部加载完成
            }
            
            return lastRange.end + 1;
        },
        
        // 获取下一个需要向前加载的结束段落
        getNextLoadStartBackward() {
            // 找到当前已加载范围的第一个，继续往前加载
            if (this.loadedRanges.length === 0) {
                return -1;
            }
            
            // 按起始位置排序
            const sorted = [...this.loadedRanges].sort((a, b) => a.start - b.start);
            const firstRange = sorted[0];
            
            if (firstRange.start <= 0) {
                return -1; // 已经到开头了
            }
            
            // 返回需要加载的起始段落（往前 batchSize 个）
            return Math.max(0, firstRange.start - this.batchSize);
        },
        
        // 获取加载间隙（未加载的段落范围）
        getLoadingGap(startParagraph) {
            // 检查这个起始位置是否在已加载范围内
            for (const range of this.loadedRanges) {
                if (startParagraph >= range.start && startParagraph <= range.end) {
                    return null; // 已经加载过了
                }
            }
            return { start: startParagraph };
        },
        
        // 合并加载范围
        mergeRanges() {
            if (this.loadedRanges.length <= 1) return;
            
            this.loadedRanges.sort((a, b) => a.start - b.start);
            const merged = [this.loadedRanges[0]];
            
            for (let i = 1; i < this.loadedRanges.length; i++) {
                const current = this.loadedRanges[i];
                const last = merged[merged.length - 1];
                
                if (current.start <= last.end + 1) {
                    last.end = Math.max(last.end, current.end);
                } else {
                    merged.push(current);
                }
            }
            
            this.loadedRanges = merged;
        },
        
        // 添加已加载范围
        addLoadedRange(start, end) {
            this.loadedRanges.push({ start, end });
            this.mergeRanges();
        },
        
        // 重置状态
        reset() {
            this.isEpub = false;
            this.totalParagraphs = 0;
            this.loadedRanges = [];
            this.loadingRanges.clear();
            this.pendingStartParagraph = null;
            this.isLoading = false;
            this.chapterMap = [];
        }
    };

    document.addEventListener('keydown', (event) => {
        if (event.shiftKey && event.metaKey && event.code === 'KeyO') {
            window.location.href = './';
        }
    });

    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        fileName = urlParams.get('name');

        if (!fileName) {
            alert('未提供文件名参数');
            return;
        }

        // 记录已访问文件
        try {
            const visitedFiles = JSON.parse(localStorage.getItem('visitedFiles') || '[]');
            if (!visitedFiles.includes(fileName)) {
                visitedFiles.push(fileName);
                localStorage.setItem('visitedFiles', JSON.stringify(visitedFiles));
            }
        } catch (e) {
            console.error('记录已访问文件失败:', e);
        }

        // 更新页面标题
        document.title = fileName.replace(/\.txt$/i, '').replace(/\.md$/i, '').replace(/\.epub$/i, '').trim();

        // 获取文件内容并渲染
        fetchFileContent(fileName);
        
        // 初始化模式切换按钮
        const modeToggle = document.getElementById('modeToggle');
        modeToggle.textContent = isPaginated ? '📄' : '📖';
        modeToggle.title = isPaginated ? '切换为滚动模式' : '切换为翻页模式';
        modeToggle.addEventListener('click', toggleReadingMode);
        
        // 初始化点击翻页区域显示状态
        if (isPaginated) {
            document.getElementById('clickAreaLeft').style.display = 'block';
            document.getElementById('clickAreaRight').style.display = 'block';
        } else {
            document.getElementById('clickAreaLeft').style.display = 'none';
            document.getElementById('clickAreaRight').style.display = 'none';
        }
        
        // 分页控制按钮事件
        document.getElementById('prevPage').addEventListener('click', prevPage);
        document.getElementById('nextPage').addEventListener('click', nextPage);
        
        // 页面点击翻页事件
        document.getElementById('clickAreaLeft').addEventListener('click', (e) => {
            if (isPaginated) {
                e.preventDefault();
                prevPage();
            }
        });
        document.getElementById('clickAreaRight').addEventListener('click', (e) => {
            if (isPaginated) {
                e.preventDefault();
                nextPage();
            }
        });
        
        // 键盘翻页快捷键
        document.addEventListener('keydown', (event) => {
            // 左右箭头翻页
            if (isPaginated) {
                if (event.key === 'ArrowLeft' || event.key === 'PageUp') {
                    event.preventDefault();
                    prevPage();
                } else if (event.key === 'ArrowRight' || event.key === 'PageDown' || event.key === ' ') {
                    event.preventDefault();
                    nextPage();
                }
            }
        });
    });

    function fixLatexTextSubscripts(content) {
        const regex = /\\text\{([^{}]+)\}_\{([^{}]+)\}/g;
        const fixedContent = content.replace(regex, (match, textContent, subscript) => {
            return `${textContent}_${subscript}`;
        });
        return fixedContent;
    }

    /**
     * 预处理文本，解决 Markdown 和 KaTeX 之间的冲突
     * @param {string} text - 原始文件内容
     * @returns {string} - 处理后的文本
     */
    function preprocessText(text) {
        // 1. 保护数学公式块，防止段落处理破坏它们
        const mathBlocks = [];
        // 正则表达式匹配 $$...$$ 或 \[...\] 块。/s 标志让 . 匹配换行符。
        const blockRegex = /(\$\$[\s\S]*?\$\$|\\\[[\s\S]*?\\\])/g;
        
        let processedText = text.replace(blockRegex, (match) => {
            mathBlocks.push(match);
            // 使用一个不会在普通文本中出现的唯一占位符
            return `__MATH_BLOCK_${mathBlocks.length - 1}__`;
        });

        // 2. 现在可以安全地处理段落、内联公式和其它清理工作
        processedText = processedText
            .replace(/\\\(/g, '$')      // 将 \(` 替换为 `$`
            .replace(/\\\)/g, '$')      // 将 `\) 替换为 `$`
            .replace(/\n+/g, '\n\n')    // 将多个换行替换为两个换行 (现在是安全的)
            .replace(/\[音乐\]|\[掌声\]|（掌声）|（音乐）|【音乐】|【掌声】/g, '')
            .replace(/^>>\s?/gm, '')
            .trim();

        // 3. 恢复数学公式块
        processedText = processedText.replace(/__MATH_BLOCK_(\d+)__/g, (match, index) => {
            // 在恢复时，顺便统一块级公式的分隔符为 $$
            let block = mathBlocks[parseInt(index, 10)];
            return block.replace(/\\\[/g, '$$').replace(/\\\]/g, '$$');
        });
        
        // 4. 对恢复后的完整文本进行最后的 LaTeX 修正
        processedText = fixLatexTextSubscripts(processedText);

        return processedText;
    }

    // 检查是否为 EPUB 文件
    function isEpubFile(name) {
        return name.toLowerCase().endsWith('.epub');
    }
    
    // 加载 EPUB 段落范围
    async function loadEpubRange(startParagraph, isPriority = false, direction = 'forward') {
        if (!EPUB_LOADER.isEpub) return;
        if (EPUB_LOADER.isLoading && !isPriority) return;
        if (startParagraph < 0 || startParagraph >= EPUB_LOADER.totalParagraphs) return;
        
        // 检查是否已加载
        if (EPUB_LOADER.isParagraphLoaded(startParagraph)) return;
        
        // 检查是否已经在加载这个范围
        const rangeKey = `${direction}-${startParagraph}`;
        if (EPUB_LOADER.loadingRanges.has(rangeKey)) return;
        
        EPUB_LOADER.loadingRanges.add(rangeKey);
        EPUB_LOADER.isLoading = true;
        
        console.log(`加载 EPUB 段落范围 [${direction}]: ${startParagraph} ~ ${startParagraph + EPUB_LOADER.batchSize - 1}`);
        
        try {
            const contentUrl = SERVER_CONFIG.progressOnly && SERVER_CONFIG.remoteServerUrl 
                ? `${SERVER_CONFIG.remoteServerUrl}/epub-content?name=` + encodeURIComponent(fileName) + `&start=${startParagraph}`
                : '/epub-content?name=' + encodeURIComponent(fileName) + `&start=${startParagraph}`;
            
            const response = await fetch(contentUrl);
            if (!response.ok) throw new Error('网络响应错误');
            
            const data = await response.json();
            
            // 记录已加载范围
            EPUB_LOADER.addLoadedRange(data.startParagraph, data.endParagraph);
            EPUB_LOADER.loadingRanges.delete(rangeKey);
            
            // 渲染新加载的内容（根据方向决定插入位置）
            if (direction === 'backward') {
                prependEpubContent(data.content, data.startParagraph);
            } else {
                appendEpubContent(data.content, data.startParagraph);
            }
            
            // 如果有更多内容且是优先加载，继续加载
            if (isPriority) {
                // 优先加载时，继续向两边扩展
                setTimeout(() => {
                    // 先向后加载
                    const nextForward = EPUB_LOADER.getNextLoadStartForward();
                    if (nextForward >= 0 && nextForward < EPUB_LOADER.totalParagraphs) {
                        loadEpubRange(nextForward, false, 'forward');
                    }
                    // 再向前加载
                    const nextBackward = EPUB_LOADER.getNextLoadStartBackward();
                    if (nextBackward >= 0) {
                        loadEpubRange(nextBackward, false, 'backward');
                    }
                }, 100);
            }
            
            return data;
        } catch (error) {
            console.error('加载 EPUB 段落失败:', error);
            EPUB_LOADER.loadingRanges.delete(rangeKey);
        } finally {
            EPUB_LOADER.isLoading = false;
        }
    }
    
    // 追加 EPUB 内容到页面（向后加载）
    function appendEpubContent(contentHtml, startParagraph) {
        const contentDiv = document.getElementById('content');
        
        // 创建临时容器解析内容
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = sanitizeHtml(marked.parse(contentHtml));

        // 给每个段落添加ID
        const paragraphs = tempDiv.querySelectorAll('p[data-index]');
        paragraphs.forEach(p => {
            const index = p.getAttribute('data-index');
            p.id = index;
        });
        
        // 追加到内容区
        const children = Array.from(tempDiv.children);
        children.forEach(child => {
            contentDiv.appendChild(child);
        });
        
        // 渲染数学公式
        if (typeof renderMathInElement !== 'undefined') {
            renderMathInElement(contentDiv, {
                delimiters: [
                    { left: "$$", right: "$$", display: true },
                    { left: "$", right: "$", display: false },
                    { left: "\\[", right: "\\]", display: true },
                    { left: "\\(", right: "\\)", display: false }
                ]
            });
        }
        
        // 如果是翻页模式，需要重新分页
        if (isPaginated) {
            setTimeout(() => {
                paginateContent();
            }, 100);
        }
    }
    
    // 向前插入 EPUB 内容（向前加载）
    function prependEpubContent(contentHtml, startParagraph) {
        const contentDiv = document.getElementById('content');
        
        // 记录当前滚动位置参考点（用于保持滚动位置）
        const firstElement = contentDiv.querySelector('[id]');
        const firstElementId = firstElement ? firstElement.id : null;
        let firstElementOffset = 0;
        if (firstElement) {
            const rect = firstElement.getBoundingClientRect();
            firstElementOffset = rect.top;
        }
        
        // 创建临时容器解析内容
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = sanitizeHtml(marked.parse(contentHtml));

        // 给每个段落添加ID
        const paragraphs = tempDiv.querySelectorAll('p[data-index]');
        paragraphs.forEach(p => {
            const index = p.getAttribute('data-index');
            p.id = index;
        });
        
        // 插入到内容区开头
        const children = Array.from(tempDiv.children);
        // 需要倒序插入，因为每次 insertBefore 都会在第一个子元素前插入
        for (let i = children.length - 1; i >= 0; i--) {
            if (contentDiv.firstChild) {
                contentDiv.insertBefore(children[i], contentDiv.firstChild);
            } else {
                contentDiv.appendChild(children[i]);
            }
        }
        
        // 渲染数学公式
        if (typeof renderMathInElement !== 'undefined') {
            renderMathInElement(contentDiv, {
                delimiters: [
                    { left: "$$", right: "$$", display: true },
                    { left: "$", right: "$", display: false },
                    { left: "\\[", right: "\\]", display: true },
                    { left: "\\(", right: "\\)", display: false }
                ]
            });
        }
        
        // 恢复滚动位置，避免页面跳动
        if (firstElementId) {
            const element = document.getElementById(firstElementId);
            if (element) {
                const newRect = element.getBoundingClientRect();
                const scrollDelta = newRect.top - firstElementOffset;
                if (Math.abs(scrollDelta) > 1) {
                    window.scrollBy(0, scrollDelta);
                }
            }
        }
        
        // 如果是翻页模式，需要重新分页
        if (isPaginated) {
            setTimeout(() => {
                paginateContent();
            }, 100);
        }
    }
    
    // 获取当前视口中间的段落索引
    function getMiddleParagraphIndex() {
        const paragraphs = document.querySelectorAll('#content p[data-index]');
        if (paragraphs.length === 0) return null;
        
        const viewportCenter = window.innerHeight / 2 + window.scrollY;
        let closest = null;
        let closestDistance = Infinity;
        
        paragraphs.forEach(p => {
            const rect = p.getBoundingClientRect();
            const center = rect.top + rect.height / 2 + window.scrollY;
            const distance = Math.abs(center - viewportCenter);
            
            if (distance < closestDistance) {
                closestDistance = distance;
                const idx = parseInt(p.getAttribute('data-index'), 10);
                if (Number.isFinite(idx)) {
                    closest = idx;
                }
            }
        });
        
        console.log('[DEBUG getMiddleParagraphIndex] 返回 closest=', closest, 'type=', typeof closest);
        return closest;
    }
    
    // 检查是否需要预加载（双向）
    function checkPreload() {
        if (!EPUB_LOADER.isEpub) return;
        if (EPUB_LOADER.isLoading) return;
        
        const currentMiddle = getMiddleParagraphIndex();
        if (currentMiddle === null) return;
        
        if (EPUB_LOADER.loadedRanges.length === 0) return;
        
        const sorted = [...EPUB_LOADER.loadedRanges].sort((a, b) => a.start - b.start);
        const firstRange = sorted[0];
        const lastRange = sorted[sorted.length - 1];
        
        // 检查是否需要向后加载
        const distanceToEnd = lastRange.end - currentMiddle;
        if (distanceToEnd < EPUB_LOADER.preloadThreshold) {
            const nextStart = lastRange.end + 1;
            if (nextStart < EPUB_LOADER.totalParagraphs && !EPUB_LOADER.loadingRanges.has(`fwd-${nextStart}`)) {
                console.log('触发向后预加载，当前段落:', currentMiddle, '已加载到:', lastRange.end);
                loadEpubRange(nextStart, false, 'forward');
                return; // 一次只加载一个方向
            }
        }
        
        // 检查是否需要向前加载
        const distanceToStart = currentMiddle - firstRange.start;
        if (distanceToStart < EPUB_LOADER.preloadThreshold) {
            const prevStart = EPUB_LOADER.getNextLoadStartBackward();
            if (prevStart >= 0 && !EPUB_LOADER.loadingRanges.has(`bwd-${prevStart}`)) {
                console.log('触发向前预加载，当前段落:', currentMiddle, '已加载从:', firstRange.start);
                loadEpubRange(prevStart, false, 'backward');
            }
        }
    }
    
    // 滚动事件监听（节流）
    let scrollTimeout = null;
    window.addEventListener('scroll', () => {
        if (scrollTimeout) return;
        scrollTimeout = setTimeout(() => {
            checkPreload();
            scrollTimeout = null;
        }, 200);
    });

    async function fetchFileContent(fileName) {
        console.log('请求文件内容：', fileName);
        
        // 判断是否为 EPUB 文件
        if (isEpubFile(fileName)) {
            EPUB_LOADER.reset();
            EPUB_LOADER.isEpub = true;
            
            // 清空内容区
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = '';
            
            try {
                // 1. 先获取 EPUB 信息
                const infoUrl = SERVER_CONFIG.progressOnly && SERVER_CONFIG.remoteServerUrl 
                    ? `${SERVER_CONFIG.remoteServerUrl}/epub-info?name=` + encodeURIComponent(fileName)
                    : '/epub-info?name=' + encodeURIComponent(fileName);
                
                const infoResponse = await fetch(infoUrl);
                if (!infoResponse.ok) throw new Error('获取 EPUB 信息失败');
                
                const info = await infoResponse.json();
                EPUB_LOADER.totalParagraphs = info.totalParagraphs;
                EPUB_LOADER.chapterMap = info.chapters;
                
                console.log('EPUB 信息:', info);
                
                // 2. 尝试从服务器获取阅读进度
                let startParagraph = 0;
                try {
                    const progressUrl = SERVER_CONFIG.progressOnly && SERVER_CONFIG.remoteServerUrl 
                        ? `${SERVER_CONFIG.remoteServerUrl}/get-progress?name=` + encodeURIComponent(fileName)
                        : '/get-progress?name=' + encodeURIComponent(fileName);
                    
                    const progressResponse = await fetch(progressUrl);
                    if (progressResponse.ok) {
                        const progressData = await progressResponse.json();
                        if (progressData.progress !== null && progressData.progress > 0) {
                            // 段落进度就是段落索引
                            startParagraph = Math.max(0, progressData.progress - 10); // 稍微往前一点
                            console.log('从进度恢复，起始段落:', startParagraph);
                        }
                    }
                } catch (e) {
                    console.log('获取进度失败，从开头开始');
                }
                
                // 3. 优先加载当前位置附近的内容（向后）
                EPUB_LOADER.pendingStartParagraph = startParagraph;
                await loadEpubRange(startParagraph, true, 'forward');
                
                // 4. 同时向前加载一批（确保向上翻也能看到内容）
                const prevStart = Math.max(0, startParagraph - EPUB_LOADER.batchSize);
                if (prevStart < startParagraph) {
                    loadEpubRange(prevStart, false, 'backward');
                }
                
                // 5. 滚动到目标段落
                setTimeout(() => {
                    const targetP = document.getElementById(String(startParagraph));
                    if (targetP) {
                        targetP.scrollIntoView({ behavior: 'auto', block: 'center' });
                    }
                    checkAndSendMiddlePIndex();
                }, 300);
                
                // 6. 继续预加载后续内容
                const nextStart = EPUB_LOADER.getNextLoadStartForward();
                if (nextStart >= 0) {
                    loadEpubRange(nextStart, false, 'forward');
                }
                
            } catch (error) {
                console.error('EPUB 分段加载失败:', error);
                // 失败时回退到旧接口
                fetchEpubFallback(fileName);
            }
        } else {
            // 普通文件使用旧方式加载
            fetchRegularFile(fileName);
        }
    }
    
    // 普通文件加载（txt/md）
    function fetchRegularFile(fileName) {
        const contentUrl = SERVER_CONFIG.progressOnly && SERVER_CONFIG.remoteServerUrl 
            ? `${SERVER_CONFIG.remoteServerUrl}/file-content?name=` + encodeURIComponent(fileName)
            : '/file-content?name=' + encodeURIComponent(fileName);
        fetch(contentUrl)
            .then(response => {
                console.log('响应状态：', response.status);
                if (!response.ok) {
                    throw new Error('网络响应错误，状态码：' + response.status);
                }
                return response.text();
            })
            .then(text => {
                console.log('文件内容获取成功');
                
                // 保存原始文本以便切换模式时重新渲染
                const contentDiv = document.getElementById('content');
                contentDiv.setAttribute('data-original-text', text);
                
                // 使用新的预处理函数
                const processedText = preprocessText(text);

                console.log('开始渲染内容');
                parseMarkdownToHtml(processedText);
                checkAndSendMiddlePIndex();
            })
            .catch(error => {
                console.error('获取文件内容出错：', error);
                alert('无法获取文件内容，请检查控制台以获取更多信息。');
            });

    // EPUB 加载失败回退
    function fetchEpubFallback(fileName) {
        console.log('使用回退方式加载 EPUB');
        const contentUrl = SERVER_CONFIG.progressOnly && SERVER_CONFIG.remoteServerUrl 
            ? `${SERVER_CONFIG.remoteServerUrl}/file-content?name=` + encodeURIComponent(fileName)

                console.error('回退加载也失败了:', error);
                alert('无法加载 EPUB 文件');
            });
    }

    // 简单的前端 HTML 清理：移除 script 标签和事件处理器，防止 XSS
    function sanitizeHtml(html) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        // 移除所有 script 和 style 标签（style 虽然不算 XSS，但防止样式污染）
        doc.querySelectorAll('script, style').forEach(el => el.remove());
        // 移除所有 on* 事件属性
        doc.querySelectorAll('*').forEach(el => {
            [...el.attributes].forEach(attr => {
                if (attr.name.toLowerCase().startsWith('on')) {
                    el.removeAttribute(attr.name);
                }
            });
        });
        return doc.body.innerHTML;
    }

    function parseMarkdownToHtml(text) {
        console.log('正在执行 parseMarkdownToHtml 函数');
        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = ''; // 清空之前的内容

        if (typeof marked === 'undefined') {
            console.error('marked 库未定义');
            return;
        }

        const html = sanitizeHtml(marked.parse(text));
        console.log('生成的 HTML 内容：', html);
        contentDiv.innerHTML = html;

        contentDiv.querySelectorAll('*').forEach((el, index) => {
            el.id = `${index + 1}`;
        });

        if (typeof renderMathInElement === 'undefined') {
            console.error('renderMathInElement 函数未定义');
            return;
        }
        
        renderMathInElement(contentDiv, {
            delimiters: [
                { left: "$$", right: "$$", display: true },
                { left: "$", right: "$", display: false },
                // 下面两行现在是备用，因为我们已经预处理为 $$
                { left: "\\[", right: "\\]", display: true },
                { left: "\\(", right: "\\)", display: false }
            ]
        });
        
        // 渲染完成后，如果是翻页模式则进行分页（带进度恢复）
        if (isPaginated) {
            setTimeout(() => {
                initPaginatedMode();
            }, 100);
        }
    }
    
    // 获取字体配置信息
    function getFontMetrics() {
        const contentDiv = document.getElementById('content');
        const computedStyle = window.getComputedStyle(contentDiv);
        const fontSize = parseFloat(computedStyle.fontSize) || 18;
        
        // lineHeight 可能是数值或比例如 "1.5"
        let lineHeight = parseFloat(computedStyle.lineHeight);
        if (!lineHeight || isNaN(lineHeight)) {
            lineHeight = fontSize * 1.5;
        } else if (lineHeight < 5) {
            // 如果是比例值（如 1.5），转换为实际像素
            lineHeight = lineHeight * fontSize;
        }
        
        const contentWidth = contentDiv.clientWidth - 40; // 减去内边距
        
        // Sarasa Mono SC 是等宽字体
        // 中文字符宽度 = fontSize，英文字符宽度 = fontSize / 2
        const charWidthCN = fontSize;
        const charWidthEN = fontSize / 2;
        
        // 每行可以放多少中文字符
        const charsPerLine = Math.floor(contentWidth / charWidthCN);
        
        return { fontSize, lineHeight, contentWidth, charWidthCN, charWidthEN, charsPerLine };
    }
    
    // 计算文本需要多少行
    function calculateTextLines(text, charsPerLine) {
        let lines = 0;
        let currentLineChars = 0;
        
        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            // 中文和全角字符算1个宽度，半角算0.5个
            const charWidth = (char.charCodeAt(0) > 127) ? 1 : 0.5;
            
            if (currentLineChars + charWidth > charsPerLine && currentLineChars > 0) {
                lines++;
                currentLineChars = charWidth;
            } else {
                currentLineChars += charWidth;
            }
        }
        
        if (currentLineChars > 0) {
            lines++;
        }
        
        return lines;
    }
    
    // 根据字符宽度找到最佳切分点（避免在标点前切开）
    function findBestSplitPoint(text, targetWidth, charsPerLine) {
        let currentWidth = 0;
        let lastGoodIndex = 0;
        
        // 不能在这些标点前切开
        const avoidBefore = "，。！？、；：'\"》」』’”,:;!?.,";
        // 可以在这些标点后切开
        const goodAfter = "，。！？、；：'\"》」』’”,:;!?., 　";
        
        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            const charWidth = (char.charCodeAt(0) > 127) ? 1 : 0.5;
            
            if (currentWidth + charWidth > targetWidth && lastGoodIndex > 0) {
                return lastGoodIndex;
            }
            
            currentWidth += charWidth;
            
            // 如果下一个字符是不能在前切开的标点，或当前是可切开的标点
            if (i < text.length - 1 && avoidBefore.includes(text[i + 1])) {
                // 不在标点前切，继续
                continue;
            }
            
            // 检查是否是好的切分点（在可切开标点后或空格后）
            if (goodAfter.includes(char) || char === ' ') {
                lastGoodIndex = i + 1;
            }
            
            // 如果已经超过目标宽度很多，强制切开
            if (currentWidth >= targetWidth + charsPerLine * 0.5) {
                return lastGoodIndex > 0 ? lastGoodIndex : i + 1;
            }
        }
        
        return text.length;
    }
    
    // 按行数切分文本（避免在标点前切开）
    function splitTextByLines(text, charsPerLine, maxLines) {
        // 首先按行数计算目标宽度
        const targetWidth = charsPerLine * maxLines;
        
        // 找到最佳切分点
        const splitPoint = findBestSplitPoint(text, targetWidth, charsPerLine);
        
        const firstPart = text.slice(0, splitPoint);
        const secondPart = text.slice(splitPoint);
        
        return { firstPart, secondPart };
    }
    
    // 分页功能 - 基于等宽字体行数计算
    // targetParagraphIndex: 要跳转到的段落索引（null表示不跳转）
    function paginateContent(targetParagraphIndex = null) {
        const contentDiv = document.getElementById('content');
        const originalElements = Array.from(contentDiv.children).filter(el => {
            if (el.tagName === 'SCRIPT') return false;
            if (el.textContent.trim() === '') return false;
            return true;
        });
        
        if (originalElements.length === 0) return;
        
        // EPUB 模式下，如果内容还很少，等待加载
        if (EPUB_LOADER.isEpub && originalElements.length < 10 && EPUB_LOADER.loadedRanges.length > 0) {
            const lastRange = EPUB_LOADER.loadedRanges[EPUB_LOADER.loadedRanges.length - 1];
            if (lastRange.end < EPUB_LOADER.totalParagraphs - 1) {
                console.log('EPUB 内容加载中，稍后进行分页');
                setTimeout(() => paginateContent(targetParagraphIndex), 500);
                return;
            }
        }
        
        // 添加翻页模式的 body 类
        document.body.classList.add('paginated-mode');
        
        // 获取字体信息
        const { lineHeight, charsPerLine } = getFontMetrics();
        
        // 计算每页可用行数（留出一些余量，避免溢出）
        const pageHeight = window.innerHeight - 80;
        const linesPerPage = Math.max(5, Math.floor(pageHeight / lineHeight) - 4);
        
        console.log('分页参数:', { pageHeight, lineHeight, linesPerPage, charsPerLine });
        
        // 保存原始内容
        const elementsToPaginate = originalElements.map(el => ({
            el: el.cloneNode(true),
            tagName: el.tagName.toLowerCase(),
            text: el.textContent
        }));
        
        contentDiv.innerHTML = '';
        contentDiv.classList.add('paginated');
        
        pages = [];
        let currentPageDiv = document.createElement('div');
        currentPageDiv.className = 'page active';
        contentDiv.appendChild(currentPageDiv);
        
        let currentPageLines = 0;
        
        for (let i = 0; i < elementsToPaginate.length; i++) {
            const { el, tagName, text } = elementsToPaginate[i];
            
            let elementLines = 0;
            
            if (tagName === 'p') {
                elementLines = calculateTextLines(text, charsPerLine);
                elementLines += 1;
            } else if (tagName.match(/^h[1-6]$/)) {
                elementLines = calculateTextLines(text, charsPerLine);
                elementLines += 1;
            } else if (tagName === 'pre' || tagName === 'blockquote' || tagName === 'table') {
                const lineCount = text.split('\n').length;
                elementLines = lineCount + 1;
            } else {
                elementLines = calculateTextLines(text, charsPerLine) || 1;
                elementLines += 1;
            }
            
            if (currentPageLines === 0) {
                currentPageDiv.appendChild(el);
                currentPageLines += elementLines;
            }
            else if (currentPageLines + elementLines <= linesPerPage) {
                currentPageDiv.appendChild(el);
                currentPageLines += elementLines;
            }
            else if (tagName === 'p' && text.length > 30) {
                const remainingLines = linesPerPage - currentPageLines;
                const linesNeeded = elementLines - 1;
                
                if (remainingLines >= 1 && remainingLines < linesNeeded) {
                    const splitResult = splitTextByLines(text, charsPerLine, remainingLines);
                    
                    const firstPart = document.createElement('p');
                    firstPart.textContent = splitResult.firstPart;
                    firstPart.className = 'split-end';
                    if (el.hasAttribute('data-index')) {
                        firstPart.setAttribute('data-index', el.getAttribute('data-index'));
                    }
                    if (el.hasAttribute('id')) {
                        firstPart.setAttribute('id', el.getAttribute('id'));
                    }
                    
                    currentPageDiv.appendChild(firstPart);
                    currentPageLines = linesPerPage;
                    
                    const secondPart = document.createElement('p');
                    secondPart.textContent = splitResult.secondPart;
                    secondPart.className = 'split-start';
                    if (el.hasAttribute('data-index')) {
                        secondPart.setAttribute('data-index', el.getAttribute('data-index') + '-cont');
                    }
                    
                    currentPageDiv = document.createElement('div');
                    currentPageDiv.className = 'page';
                    contentDiv.appendChild(currentPageDiv);
                    
                    currentPageDiv.appendChild(secondPart);
                    const remainingTextLines = calculateTextLines(splitResult.secondPart, charsPerLine);
                    currentPageLines = remainingTextLines + 1;
                } else {
                    currentPageDiv = document.createElement('div');
                    currentPageDiv.className = 'page';
                    contentDiv.appendChild(currentPageDiv);
                    
                    currentPageDiv.appendChild(el);
                    currentPageLines = elementLines;
                }
            }
            else {
                currentPageDiv = document.createElement('div');
                currentPageDiv.className = 'page';
                contentDiv.appendChild(currentPageDiv);
                
                currentPageDiv.appendChild(el);
                currentPageLines = elementLines;
            }
        }
        
        pages = contentDiv.querySelectorAll('.page');
        totalPages = pages.length;
        
        console.log('分页完成，总页数:', totalPages);
        
        // 显示分页控制
        const pageControls = document.getElementById('pageControls');
        pageControls.style.display = 'flex';
        
        // 计算目标页码
        let targetPage = 1;
        if (targetParagraphIndex !== null) {
            targetPage = findPageByParagraphIndex(targetParagraphIndex);
            console.log('目标段落索引:', targetParagraphIndex, '对应页码:', targetPage);
        }
        
        // 设置当前页并显示
        currentPage = targetPage;
        updatePageInfo();
        updatePageButtons();
        showPage(targetPage);
    }
    
    // 初始化翻页模式（带进度恢复）- 先获取进度再分页
    async function initPaginatedMode() {
        // 先获取服务器进度
        let targetParagraphIndex = null;
        try {
            const progressUrl = SERVER_CONFIG.progressOnly && SERVER_CONFIG.remoteServerUrl
                ? `${SERVER_CONFIG.remoteServerUrl}/get-progress?name=` + encodeURIComponent(fileName)
                : '/get-progress?name=' + encodeURIComponent(fileName);
            
            const response = await fetch(progressUrl);
            if (response.ok) {
                const data = await response.json();
                if (data.progress !== null && data.progress >= 0) {
                    targetParagraphIndex = data.progress;
                    console.log('初始化翻页模式，服务器进度段落:', targetParagraphIndex);
                }
            }
        } catch (error) {
            console.error('获取进度失败:', error);
        }
        
        // 执行分页（传入目标段落索引，分页后跳转）
        paginateContent(targetParagraphIndex);
    }
    
    // 显示指定页面
    function showPage(pageNum) {
        if (pageNum < 1 || pageNum > totalPages) return;
        
        pages.forEach((page, index) => {
            if (index === pageNum - 1) {
                page.classList.add('active');
            } else {
                page.classList.remove('active');
            }
        });
    }
    
    // 切换到指定页面（不保存进度，用于初始跳转）
    function showPageWithoutSave(pageNum) {
        if (pageNum < 1 || pageNum > totalPages) return;
        
        currentPage = pageNum;
        showPage(currentPage);
        updatePageInfo();
        updatePageButtons();
    }
    
    // 切换到指定页面
    function goToPage(pageNum) {
        if (pageNum < 1 || pageNum > totalPages) return;
        
        currentPage = pageNum;
        showPage(currentPage);
        updatePageInfo();
        updatePageButtons();
        
        // 保存阅读进度
        savePaginatedProgress();
    }
    
    // 下一页
    function nextPage() {
        if (currentPage < totalPages) {
            goToPage(currentPage + 1);
        }
    }
    
    // 上一页
    function prevPage() {
        if (currentPage > 1) {
            goToPage(currentPage - 1);
        }
    }
    
    // 更新页码显示
    function updatePageInfo() {
        document.getElementById('pageInfo').textContent = `${currentPage} / ${totalPages}`;
    }
    
    // 更新按钮状态
    function updatePageButtons() {
        document.getElementById('prevPage').disabled = currentPage === 1;
        document.getElementById('nextPage').disabled = currentPage === totalPages;
    }
    
    // 获取当前阅读位置的段落索引（统一返回 0-based 索引）
    function getCurrentParagraphIndex() {
        if (isPaginated) {
            // 翻页模式：获取当前页第一个段落的索引
            const currentPageElement = document.querySelector('.content.paginated .page.active');
            if (currentPageElement) {
                const paragraphs = currentPageElement.querySelectorAll('p[id], p[data-index]');
                if (paragraphs.length > 0) {
                    const firstP = paragraphs[0];
                    const index = firstP.getAttribute('data-index');
                    if (index !== null) {
                        return parseInt(index, 10);
                    }
                    const idNum = parseInt(firstP.id, 10);
                    return isNaN(idNum) ? null : idNum - 1;
                }
            }
        } else {
            // 滚动模式：获取屏幕中间的段落索引
            if (EPUB_LOADER.isEpub) {
                return getMiddleParagraphIndex();
            } else {
                // getMiddlePIndex 返回的是 1-based id，需要转换为 0-based 索引
                const id = getMiddlePIndex();
                return id !== null ? id - 1 : null;
            }
        }
        return null;
    }
    
    // 根据段落索引找到页码
    function findPageByParagraphIndex(paragraphIndex) {
        if (paragraphIndex === null) return 1;
        const targetId = EPUB_LOADER.isEpub ? String(paragraphIndex) : String(paragraphIndex + 1);
        const allPages = document.querySelectorAll('.content.paginated .page');
        
        for (let i = 0; i < allPages.length; i++) {
            const byId = allPages[i].querySelector(`[id="${targetId}"]`);
            const byDataIndex = allPages[i].querySelector(`[data-index="${paragraphIndex}"]`);
            if (byId || byDataIndex) {
                return i + 1;
            }
        }
        return 1;
    }
    
    // 切换阅读模式
    function toggleReadingMode() {
        // 先获取当前位置的段落索引（切换前）
        const currentParagraphIndex = getCurrentParagraphIndex();
        console.log('切换模式前当前段落索引:', currentParagraphIndex);
        
        isPaginated = !isPaginated;
        localStorage.setItem('readingMode', isPaginated ? 'paginated' : 'scroll');
        
        const contentDiv = document.getElementById('content');
        const pageControls = document.getElementById('pageControls');
        const modeToggle = document.getElementById('modeToggle');
        
        if (isPaginated) {
            // 切换到翻页模式
            modeToggle.title = '切换为滚动模式';
            
            // 显示点击翻页区域
            document.getElementById('clickAreaLeft').style.display = 'block';
            document.getElementById('clickAreaRight').style.display = 'block';
            
            // 执行分页（传入当前段落索引，分页后会自动跳转）
            paginateContent(currentParagraphIndex);
        } else {
            // 切换到滚动模式
            modeToggle.title = '切换为翻页模式';
            contentDiv.classList.remove('paginated');
            document.body.classList.remove('paginated-mode');
            pageControls.style.display = 'none';
            
            // 隐藏点击翻页区域
            document.getElementById('clickAreaLeft').style.display = 'none';
            document.getElementById('clickAreaRight').style.display = 'none';
            
            // EPUB 模式下不需要重新渲染，直接显示已加载的内容
            if (!EPUB_LOADER.isEpub) {
                const text = contentDiv.getAttribute('data-original-text') || '';
                if (text) {
                    const processedText = preprocessText(text);
                    parseMarkdownToHtmlSimple(processedText);
                }
            }
            
            // 滚动到对应位置
            setTimeout(() => {
                if (currentParagraphIndex !== null) {
                    const targetId = EPUB_LOADER.isEpub ? String(currentParagraphIndex) : String(currentParagraphIndex + 1);
                    const targetElement = document.getElementById(targetId) || 
                                         document.querySelector(`[data-index="${currentParagraphIndex}"]`);
                    if (targetElement) {
                        targetElement.scrollIntoView({ behavior: 'auto', block: 'start' });
                        console.log('滚动到段落:', targetId);
                    }
                }
            }, 100);
        }
    }
    
    // 简化的渲染（用于切换回滚动模式）
    function parseMarkdownToHtmlSimple(text) {
        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = '';
        
        const html = marked.parse(text);
        contentDiv.innerHTML = html;
        
        contentDiv.querySelectorAll('*').forEach((el, index) => {
            el.id = `${index + 1}`;
        });
        
        renderMathInElement(contentDiv, {
            delimiters: [
                { left: "$$", right: "$$", display: true },
                { left: "$", right: "$", display: false },
                { left: "\\[", right: "\\]", display: true },
                { left: "\\(", right: "\\)", display: false }
            ]
        });
    }
    
    // 计算当前阅读百分比（统一基于段落数）
    function getCurrentReadingPercent() {
        if (EPUB_LOADER.isEpub && EPUB_LOADER.totalParagraphs > 0) {
            let progress = 0;
            if (isPaginated) {
                const currentPageElement = document.querySelector('.content.paginated .page.active');
                if (currentPageElement) {
                    const firstP = currentPageElement.querySelector('p[data-index]');
                    if (firstP) {
                        progress = parseInt(firstP.getAttribute('data-index'), 10) || 0;
                    }
                }
            } else {
                progress = getMiddleParagraphIndex() || 0;
            }
            // 距离末尾 5 段以内视为读完
            if (EPUB_LOADER.totalParagraphs - progress <= 5) return 100;
            return Math.min(100, Math.round((progress / EPUB_LOADER.totalParagraphs) * 100));
        }

        // 普通文件：基于 <p> 的数量计算
        const allP = document.querySelectorAll('#content p');
        const total = allP.length;
        if (total === 0) return null;

        let currentPIndex = -1;
        if (isPaginated) {
            const currentPageElement = document.querySelector('.content.paginated .page.active');
            if (currentPageElement) {
                const firstP = currentPageElement.querySelector('p');
                if (firstP) {
                    for (let i = 0; i < allP.length; i++) {
                        if (allP[i] === firstP) { currentPIndex = i; break; }
                    }
                }
            }
        } else {
            const viewportMiddle = window.innerHeight / 2 + window.scrollY;
            let closestDistance = Infinity;
            let closestP = null;
            allP.forEach(p => {
                const rect = p.getBoundingClientRect();
                const pMiddle = rect.top + window.scrollY + rect.height / 2;
                const distance = Math.abs(viewportMiddle - pMiddle);
                if (distance < closestDistance) {
                    closestDistance = distance;
                    closestP = p;
                }
            });
            if (closestP) {
                for (let i = 0; i < allP.length; i++) {
                    if (allP[i] === closestP) { currentPIndex = i; break; }
                }
            }
        }

        if (currentPIndex >= 0) {
            // 距离末尾 5 段以内视为读完
            if (total - currentPIndex <= 5) return 100;
            return Math.min(100, Math.round((currentPIndex / total) * 100));
        }
        return null;
    }

    // 缓存阅读进度到本地
    function cacheReadingProgress() {
        try {
            const percent = getCurrentReadingPercent();
            if (percent !== null) {
                localStorage.setItem(`progress_${fileName}`, JSON.stringify({
                    percent: percent,
                    timestamp: Date.now()
                }));
            }
        } catch (e) {
            console.error('缓存阅读进度失败:', e);
        }
    }

    // 保存翻页进度（保存当前页第一个段落索引到服务器）
    async function savePaginatedProgress() {
        const currentPageElement = document.querySelector('.content.paginated .page.active');
        if (!currentPageElement) return;
        
        const paragraphs = currentPageElement.querySelectorAll('p[id], p[data-index]');
        if (paragraphs.length === 0) return;
        
        const firstP = paragraphs[0];
        let paragraphIndex;
        
        const dataIndex = firstP.getAttribute('data-index');
        if (dataIndex !== null) {
            paragraphIndex = parseInt(dataIndex, 10);
        } else {
            const idNum = parseInt(firstP.id, 10);
            paragraphIndex = isNaN(idNum) ? null : idNum - 1;
        }
        
        console.log('[DEBUG savePaginatedProgress] fileName=', fileName, 'type=', typeof fileName, 'paragraphIndex=', paragraphIndex, 'type=', typeof paragraphIndex, 'isFinite=', Number.isFinite(paragraphIndex));
        if (paragraphIndex === null || !Number.isFinite(paragraphIndex)) {
            console.log('[DEBUG savePaginatedProgress] 因索引无效跳过发送');
            return;
        }
        
        console.log('翻页模式保存进度，段落索引:', paragraphIndex);
        cacheReadingProgress();
        
        try {
            const progressUrl = SERVER_CONFIG.progressOnly && SERVER_CONFIG.remoteServerUrl
                ? `${SERVER_CONFIG.remoteServerUrl}/log-middle-p-index`
                : '/log-middle-p-index';
            
            await fetch(progressUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    fileName: fileName,
                    middlePIndex: paragraphIndex
                })
            });
        } catch (error) {
            console.error('保存翻页进度失败:', error);
        }
    }
    
    // 恢复翻页进度（尝试恢复到服务器最新进度）
    async function restorePaginatedProgress() {
        let paragraphIndex = null;
        
        try {
            const progressUrl = SERVER_CONFIG.progressOnly && SERVER_CONFIG.remoteServerUrl
                ? `${SERVER_CONFIG.remoteServerUrl}/get-progress?name=` + encodeURIComponent(fileName)
                : '/get-progress?name=' + encodeURIComponent(fileName);
            
            const response = await fetch(progressUrl);
            if (response.ok) {
                const data = await response.json();
                if (data.progress !== null && data.progress >= 0) {
                    paragraphIndex = data.progress;
                    console.log('翻页模式恢复进度，段落索引:', paragraphIndex);
                }
            }
        } catch (e) {
            console.error('获取进度失败:', e);
        }
        
        if (paragraphIndex === null) {
            console.log('没有进度信息，保持在第1页');
            return;
        }
        
        // 找到该段落在哪一页
        const targetPage = findPageByParagraphIndex(paragraphIndex);
        if (targetPage > 1) {
            console.log('找到对应页码:', targetPage);
            showPageWithoutSave(targetPage);
        }
    }

    // -------------------------------------------------------------
    // 以下是您用于记录阅读位置的代码，保持不变
    // -------------------------------------------------------------
    import { getMiddlePIndex } from './recLoc.js';

    let firstLoad = true;

    // 从服务器获取阅读进度
    async function fetchReadingProgress() {
        try {
            // 优先从本地获取，如果本地没有或本地是仅进度服务器且有远端配置，则从远端获取
            const progressUrl = SERVER_CONFIG.progressOnly && SERVER_CONFIG.remoteServerUrl
                ? `${SERVER_CONFIG.remoteServerUrl}/get-progress?name=` + encodeURIComponent(fileName)
                : '/get-progress?name=' + encodeURIComponent(fileName);
            
            const response = await fetch(progressUrl);
            if (response.ok) {
                const data = await response.json();
                console.log('获取到的阅读进度:', data);
                if (data.progress !== null && data.progress !== undefined) {
                    return data.progress;
                }
            }
        } catch (error) {
            console.error('获取阅读进度失败:', error);
        }
        return null;
    }

    function checkAndSendMiddlePIndex() {
        // 翻页模式下不发送滚动进度，而是保存页码
        if (isPaginated) {
            if (firstLoad) {
                firstLoad = false;
                // 翻页模式的恢复在 paginateContent 中处理
            }
            return;
        }
        
        // EPUB 模式下使用段落索引
        let middlePIndex;
        if (EPUB_LOADER.isEpub) {
            middlePIndex = getMiddleParagraphIndex();
        } else {
            const id = getMiddlePIndex();
            middlePIndex = id !== null ? parseInt(id, 10) : null;
        }

        console.log('[DEBUG checkAndSendMiddlePIndex] fileName=', fileName, 'type=', typeof fileName, 'middlePIndex=', middlePIndex, 'type=', typeof middlePIndex, 'isFinite=', Number.isFinite(middlePIndex));
        if (middlePIndex === null || !Number.isFinite(middlePIndex)) {
            console.log('[DEBUG checkAndSendMiddlePIndex] 因索引无效跳过发送');
            return;
        }

        console.log(fileName, "当前中间的 p 是第", middlePIndex, "个");

        // 发送进度到当前服务器（保存进度）
        fetch('/log-middle-p-index', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                fileName: fileName,
                middlePIndex: middlePIndex
            })
        })
        .then(response => response.json())
        .then(async data => {
            console.log('服务器响应:', data);
            cacheReadingProgress();

            if (firstLoad) {
                firstLoad = false;
                // 优先使用从 /get-progress 获取的进度，如果没有则使用当前响应中的值
                const savedProgress = await fetchReadingProgress();
                const targetIndex = savedProgress !== null ? savedProgress : data.maxValue;
                
                if (targetIndex) {
                    const targetElement = document.getElementById(targetIndex);
                    if (targetElement) {
                        targetElement.scrollIntoView({ behavior: 'auto', block: 'center' });
                    }
                }
            }
        })
        .catch(error => console.error('发送数据失败:', error));
    }

    // 页面加载后等待DOM渲染完成再执行首次检查
    document.addEventListener('DOMContentLoaded', () => {
            // 首次滚动定位需要一点延迟，确保所有内容（特别是KaTeX）渲染完毕
        setTimeout(() => {
            // 首次加载时，我们只关心滚动到上次的位置，不发送新位置
            // checkAndSendMiddlePIndex 会处理这个逻辑
        }, 500);
    });

    // 每 3 秒执行一次
    setInterval(checkAndSendMiddlePIndex, 3000);

    function forceUpdateMiddlePIndex() {
        // 翻页模式下保存页码
        if (isPaginated) {
            savePaginatedProgress();
            showToast(`已保存到第 ${currentPage} 页`);
            return;
        }
        
        // EPUB 模式下使用段落索引
        const rawIndex = EPUB_LOADER.isEpub ? getMiddleParagraphIndex() : getMiddlePIndex();
        const middlePIndex = rawIndex !== null ? parseInt(rawIndex, 10) : null;

        console.log('[DEBUG forceUpdateMiddlePIndex] fileName=', fileName, 'type=', typeof fileName, 'middlePIndex=', middlePIndex, 'type=', typeof middlePIndex, 'isFinite=', Number.isFinite(middlePIndex));
        if (middlePIndex === null || !Number.isFinite(middlePIndex)) {
            console.log('[DEBUG forceUpdateMiddlePIndex] 因索引无效跳过发送');
            return;
        }

        console.log(fileName, "强制更新中间的 p 是第", middlePIndex, "个");

        fetch('/log-middle-p-index', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                fileName: fileName,
                middlePIndex: middlePIndex,
                force: true
            })
        })
        .then(response => response.json())
        .then(data => {
            console.log('服务器响应:', data);
            cacheReadingProgress();
            showToast('位置已更新');
        })
        .catch(error => console.error('发送数据失败:', error));
    }

    document.getElementById('forceUpdateButton').addEventListener('click', forceUpdateMiddlePIndex);

    function showToast(message, duration = 2000) {
        const toast = document.createElement('div');
        toast.className = 'custom-toast';
        toast.innerText = message;

        document.body.appendChild(toast);

        // 淡入
        setTimeout(() => {
            toast.style.opacity = '1';
            toast.style.transform = 'translateY(0)';
        }, 10);

        // 淡出并删除
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(-10px)';
            setTimeout(() => toast.remove(), 300);
        }, duration);
    }
</script>
