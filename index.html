<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>txtReader</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.13.11/dist/katex.min.css">
    <link rel="icon" type="image/x-icon" href="web_icon/yanan.png" />
    <link rel="stylesheet" type="text/css" href="afdian_styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#fff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1F2020" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="txtReader">
    <link rel="apple-touch-icon" href="web_icon/yanan_with_border.png">
    <link rel="manifest" href="manifest.json">
    <style>
        @font-face {
            font-family: 'SarasaMonoSC';
            src: local('Sarasa Mono SC'), 
                 local('SarasaMonoSC'),
                 local('Sarasa Mono SC Regular'),
                 url('/fonts/SarasaMonoSC-Regular.ttf') format('truetype');
            font-display: swap;
        }
        
        body {
            font-family: 'SarasaMonoSC', Arial, sans-serif;
            margin: auto;
            padding: 0;
        }

        /* for yanan */
        /* .folder_icon {
            height: 1em;
            width: 1em;
            margin: -0.15em 0.5em;
        } */

        /* for folder */
        .folder_icon {
            height: 1.2em;
            width: 1.2em;
            margin: -0.24em 0.5em;
        }

        .file-list {
            margin: 20px;
            padding: 10px;
        }

        .file-list ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .file-list li {
            margin: 10px 0;
            padding: 10px;
            display: flex;
            flex-direction: column; /* 垂直排列内容 */
            align-items: center; /* 确保子内容在容器中居中 */
            justify-content: center; /* 垂直方向也居中 */
            border-radius: 6px;
            text-align: center; /* 让文本水平居中 */
        }

        .file-list a {
            text-decoration: none;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            word-wrap: break-word; /* 自动换行 */
            overflow-wrap: break-word;
            max-width: 100%; /* 限制宽度，确保适应容器 */
            margin-bottom: 5px; /* 添加与时间的间距 */
            display: block; /* 使链接单独占据一行并居中 */
        }

        .file-list a:hover {
            /* text-decoration: underline; */
            text-decoration: none;
            color: #0056b3; /* 深色悬停效果 */
        }

        .file-list a:visited {
        color: #888; /* 设置访问过的链接为紫色 */
        }

        .file-list .mtime {
            font-size: 12px;
            color: #555; /* 灰色时间字体 */
            white-space: nowrap; /* 避免时间内容换行 */
            display: block; /* 确保时间单独占据一行并居中 */
        }

        #toggleFoldersOnly {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 999;
            height: 40px;
            width: 40px;
            background-color: rgba(255, 255, 255, 0);
            border-radius: 40px;
            border: none;
            cursor: pointer;
        }


    @media (prefers-color-scheme: dark) {
        .file-list a {
            color: #fff;
        }

        .file-list .mtime {
            color: #aaa;
        }

        .file-list a:hover {
            /* text-decoration: underline; */
            text-decoration: none;
            color: #3388cc; /* 深色悬停效果 */
        }
    }
    </style>
</head>
<body>
    <button id="toggleFoldersOnly"><img src="web_icon/folder.svg" class='folder_icon'></button>
    <!-- 文件列表 -->
    <div class="file-list" id="fileList">
        <!-- 文件列表将插入在这里 -->
    </div>

    <!-- 引入必要的库 -->
    <script>
        document.addEventListener('keydown', (event) => {
            if (event.shiftKey && event.metaKey && event.code === 'KeyO') {
                window.location.href = './';
            }
        });

        // 服务器配置
        const SERVER_CONFIG = {
            progressOnly: false,
            remoteServerUrl: ''
        };

        // 获取服务器配置
        async function loadServerConfig() {
            try {
                const response = await fetch('/server-config');
                if (response.ok) {
                    const config = await response.json();
                    SERVER_CONFIG.progressOnly = config.progressOnly;
                    SERVER_CONFIG.remoteServerUrl = config.remoteServerUrl;
                    console.log('服务器配置:', SERVER_CONFIG);
                }
            } catch (error) {
                console.log('获取服务器配置失败，使用默认配置:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            // 先获取服务器配置
            await loadServerConfig();

            // 如果是仅进度服务器模式，显示提示
            if (SERVER_CONFIG.progressOnly) {
                const fileListDiv = document.getElementById('fileList');
                fileListDiv.innerHTML = `
                    <div style="text-align: center; padding: 50px; color: #666;">
                        <h2>📚 仅进度服务器模式</h2>
                        <p>此服务器仅用于保存和同步阅读进度，不提供内容服务。</p>
                        ${SERVER_CONFIG.remoteServerUrl ? 
                            `<p>内容服务请访问：<a href="${SERVER_CONFIG.remoteServerUrl}">${SERVER_CONFIG.remoteServerUrl}</a></p>` : 
                            ''}
                    </div>
                `;
                return;
            }

            // 获取文件列表并显示
            const urlParams = new URLSearchParams(window.location.search);
            const dir = urlParams.get('dir') || ''; // 获取 `dir` 参数，如果不存在则为空字符串
            document.title = dir || 'txtReader';
            // fetch('/list-files')
            console.log('请求的文件夹：', dir); // 调试信息

            fetch(`/list-files?dir=${encodeURIComponent(dir)}`)
                .then(response => response.json())
                .then(files => {
                    console.log('接收到的文件列表：', files); // 调试信息
                    const fileListDiv = document.getElementById('fileList');
                    let htmlContent = '<ul>';
                    files.forEach(file => {
                        const fileName = file.name;
                        const moFileName = file.name.replace(/_/g, ' ').replace(/--/g, ' ').replace(/\.txt$/g, '').replace(/\.md$/g, '').replace(/\.epub$/i, '').replace(/——/g, ' ');
                        const mtime = new Date(file.mtime).toLocaleString().replace(/,/g, ' '); // 格式化日期
                        // 创建包含文件名和修改时间的列表项
                        // htmlContent += `<li><a href="file.html?name=${encodeURIComponent(fileName)}">${moFileName}</a><span class="mtime">${mtime}</span></li>`;
                        if (fileName.toLowerCase().endsWith('.epub')) {
                            // 如果是 EPUB 文件，显示 EPUB 图标
                            htmlContent += `<li class="file epub"><a href="file.html?name=${dir && dir !== '' ? encodeURIComponent(dir) + '/' : ''}${encodeURIComponent(fileName)}"><img src="web_icon/epub.svg" class='folder_icon'>${moFileName}</a><span class="mtime">${mtime}</span></li>`;
                        } else if (fileName.endsWith('.txt') || fileName.endsWith('.md')) {
                            // 如果是 txt/md 文件，显示文件名称和修改时间
                            htmlContent += `<li class="file"><a href="file.html?name=${dir && dir !== '' ? encodeURIComponent(dir) + '/' : ''}${encodeURIComponent(fileName)}">${moFileName}</a><span class="mtime">${mtime}</span></li>`;
                        } else {
                            // 如果是文件夹，显示文件夹名称并添加链接到文件夹页面
                            htmlContent += `<li class="folder"><a href="index.html?dir=${encodeURIComponent(fileName)}"><img src="web_icon/folder.svg" class='folder_icon'>${moFileName}</a><span class="mtime">${mtime}</span></li>`;
                        }
                    });
                    htmlContent += '</ul>';
                    fileListDiv.innerHTML = htmlContent;
                })
                .catch(error => {
                    console.error('获取文件列表出错：', error);
                });
        });

    const button = document.getElementById('toggleFoldersOnly');
    let foldersOnly = false;

    function toggleFoldersOnly() {
        foldersOnly = !foldersOnly;
        const files = document.querySelectorAll('li.file');
        const folders = document.querySelectorAll('li.folder');
        const epubs = document.querySelectorAll('li.file.epub');
        
        if (foldersOnly) {
            // 只显示文件夹和 EPUB 文件，隐藏纯文本文件
            files.forEach(file => {
                if (file.classList.contains('epub')) {
                    file.style.display = '';
                } else {
                    file.style.display = 'none';
                }
            });
            folders.forEach(folder => {
                folder.style.display = '';
            });
        } else {
            // 显示所有
            files.forEach(file => {
                file.style.display = '';
            });
            folders.forEach(folder => {
                folder.style.display = '';
            });
        }
    }

    button.addEventListener('click', () => {
        toggleFoldersOnly();
    });

    document.addEventListener('keydown', function(event) {
        // Check if Shift + Command (Meta) + S is pressed
        if (event.shiftKey && event.metaKey && event.key.toLowerCase() === 'f') {
            event.preventDefault();
            toggleFoldersOnly();
        }
    });


    </script>
    <script>
        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then((registration) => {
                        console.log('Service Worker 注册成功:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Service Worker 注册失败:', error);
                    });
            });
        }
    </script>
</body>
</html>
