<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>txtReader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.13.11/katex.min.css">
    <link rel="icon" type="image/x-icon" href="web_icon/yanan.png" />
    <link rel="stylesheet" type="text/css" href="afdian_styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#fff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1F2020" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="txtReader">
    <link rel="apple-touch-icon" href="web_icon/yanan_with_border.png">
    <link rel="manifest" href="manifest.json">
    <style>
        @font-face {
            font-family: 'SarasaMonoSC';
            src: local('Sarasa Mono SC'), 
                 local('SarasaMonoSC'),
                 local('Sarasa Mono SC Regular'),
                 url('/fonts/SarasaMonoSC-Regular.ttf') format('truetype');
            font-display: swap;
        }
        
        body {
            font-family: 'SarasaMonoSC', Arial, sans-serif;
        }
        
        /* 样式代码 */
        .back-link {
            margin-bottom: 20px;
        }
        .back-link a {
            text-decoration: none;
            color: #007BFF;
            font-size: 16px;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .content {
            overflow: hidden;
            margin: auto;
        }
        
        /* 翻页模式样式 */
        .content.paginated {
            height: calc(100vh - 120px);
            overflow: hidden;
            position: relative;
        }
        
        .content.paginated .page {
            height: 100%;
            overflow: hidden;
            padding: 20px;
            box-sizing: border-box;
            display: none;
        }
        
        .content.paginated .page.active {
            display: block;
        }
        
        /* 分页控制按钮 - 右下角 */
        .page-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        
        .page-controls:hover,
        body:hover .page-controls {
            opacity: 1;
        }
        
        .page-btn {
            height: 40px;
            width: 40px;
            background-color: rgba(255, 255, 255, 0);
            border-radius: 40px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        
        .page-btn img {
            height: 1.2em;
            width: 1.2em;
            opacity: 0.7;
        }
        
        .page-btn:hover img {
            opacity: 1;
        }
        
        .page-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }
        
        .page-info {
            font-size: 14px;
            min-width: 60px;
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 6px 10px;
            border-radius: 20px;
        }
        
        @media (prefers-color-scheme: dark) {
            .page-info {
                background: rgba(40, 40, 40, 0.8);
            }
        }
        
        .mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            height: 40px;
            width: 40px;
            background-color: rgba(255, 255, 255, 0);
            border-radius: 40px;
            border: none;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .mode-toggle img {
            height: 1.2em;
            width: 1.2em;
            opacity: 0.7;
        }
        
        .mode-toggle:hover img {
            opacity: 1;
        }
        
        body:hover .mode-toggle {
            opacity: 1;
        }
        
        #forceUpdateButton {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 999;
            height: 40px;
            width: 40px;
            background-color: rgba(255, 255, 255, 0);
            border-radius: 40px;
            border: none;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        #forceUpdateButton:hover {
            opacity: 1;
        }

        .custom-toast {
            position: fixed;
            top: 20px;
            right: 70px;
            background: #00000005;
            backdrop-filter: blur(10px);
            padding: 5px 8px;
            border-radius: 6px;
            font-size: 12px;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <button id="forceUpdateButton" title="刷新位置"><img src="web_icon/refresh.svg" style="height: 1.2em; width: 1.2em; margin: -0.24em 0.5em;"></button>
    <button id="modeToggle" class="mode-toggle" title="切换翻页/滚动模式"><img src="web_icon/epub.svg" style="height: 1.2em; width: 1.2em; margin: -0.24em 0.5em;"></button>
    
    <!-- 返回链接 -->
    <div class="back-link">
        <!-- <a href="index.html">← 返回文件列表</a> -->
    </div>

    <!-- 渲染后的内容 -->
    <div class="content" id="content">
        <!-- 渲染后的内容将会插入在这里 -->
    </div>
    
    <!-- 分页控制 - 右下角 -->
    <div class="page-controls" id="pageControls" style="display: none;">
        <button class="page-btn" id="prevPage" title="上一页 (←)"><img src="web_icon/folder.svg" style="transform: rotate(180deg);"></button>
        <span class="page-info" id="pageInfo">1 / 1</span>
        <button class="page-btn" id="nextPage" title="下一页 (→)"><img src="web_icon/folder.svg"></button>
    </div>

    <!-- 引入必要的库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.13.11/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.13.11/contrib/auto-render.min.js"></script>

    <script type="module">
    // 服务器配置
    const SERVER_CONFIG = {
        progressOnly: false,
        remoteServerUrl: ''
    };

    // 获取服务器配置
    async function loadServerConfig() {
        try {
            const response = await fetch('/server-config');
            if (response.ok) {
                const config = await response.json();
                SERVER_CONFIG.progressOnly = config.progressOnly;
                SERVER_CONFIG.remoteServerUrl = config.remoteServerUrl;
                console.log('服务器配置:', SERVER_CONFIG);
            }
        } catch (error) {
            console.log('获取服务器配置失败，使用默认配置:', error);
        }
    }

    // 页面加载时获取配置
    loadServerConfig();

    var fileName = '';
    
    // 阅读模式状态
    let isPaginated = localStorage.getItem('readingMode') === 'paginated';
    let currentPage = 1;
    let totalPages = 1;
    let pages = [];

    document.addEventListener('keydown', (event) => {
        if (event.shiftKey && event.metaKey && event.code === 'KeyO') {
            window.location.href = './';
        }
    });

    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        fileName = urlParams.get('name');

        if (!fileName) {
            alert('未提供文件名参数');
            return;
        }

        // 更新页面标题
        document.title = fileName.replace(/\.txt$/i, '').replace(/\.md$/i, '').replace(/\.epub$/i, '').trim();

        // 获取文件内容并渲染
        fetchFileContent(fileName);
        
        // 初始化模式切换按钮
        const modeToggle = document.getElementById('modeToggle');
        modeToggle.textContent = isPaginated ? '📄' : '📖';
        modeToggle.title = isPaginated ? '切换为滚动模式' : '切换为翻页模式';
        modeToggle.addEventListener('click', toggleReadingMode);
        
        // 分页控制按钮事件
        document.getElementById('prevPage').addEventListener('click', prevPage);
        document.getElementById('nextPage').addEventListener('click', nextPage);
        
        // 键盘翻页快捷键
        document.addEventListener('keydown', (event) => {
            // 左右箭头翻页
            if (isPaginated) {
                if (event.key === 'ArrowLeft' || event.key === 'PageUp') {
                    event.preventDefault();
                    prevPage();
                } else if (event.key === 'ArrowRight' || event.key === 'PageDown' || event.key === ' ') {
                    event.preventDefault();
                    nextPage();
                }
            }
        });
    });

    function fixLatexTextSubscripts(content) {
        const regex = /\\text\{([^{}]+)\}_\{([^{}]+)\}/g;
        const fixedContent = content.replace(regex, (match, textContent, subscript) => {
            return `${textContent}_${subscript}`;
        });
        return fixedContent;
    }

    /**
     * 预处理文本，解决 Markdown 和 KaTeX 之间的冲突
     * @param {string} text - 原始文件内容
     * @returns {string} - 处理后的文本
     */
    function preprocessText(text) {
        // 1. 保护数学公式块，防止段落处理破坏它们
        const mathBlocks = [];
        // 正则表达式匹配 $$...$$ 或 \[...\] 块。/s 标志让 . 匹配换行符。
        const blockRegex = /(\$\$[\s\S]*?\$\$|\\\[[\s\S]*?\\\])/g;
        
        let processedText = text.replace(blockRegex, (match) => {
            mathBlocks.push(match);
            // 使用一个不会在普通文本中出现的唯一占位符
            return `__MATH_BLOCK_${mathBlocks.length - 1}__`;
        });

        // 2. 现在可以安全地处理段落、内联公式和其它清理工作
        processedText = processedText
            .replace(/\\\(/g, '$')      // 将 \(` 替换为 `$`
            .replace(/\\\)/g, '$')      // 将 `\) 替换为 `$`
            .replace(/\n+/g, '\n\n')    // 将多个换行替换为两个换行 (现在是安全的)
            .replace(/\[音乐\]|\[掌声\]|（掌声）|（音乐）|【音乐】|【掌声】/g, '')
            .replace(/^>>\s?/gm, '')
            .trim();

        // 3. 恢复数学公式块
        processedText = processedText.replace(/__MATH_BLOCK_(\d+)__/g, (match, index) => {
            // 在恢复时，顺便统一块级公式的分隔符为 $$
            let block = mathBlocks[parseInt(index, 10)];
            return block.replace(/\\\[/g, '$$').replace(/\\\]/g, '$$');
        });
        
        // 4. 对恢复后的完整文本进行最后的 LaTeX 修正
        processedText = fixLatexTextSubscripts(processedText);

        return processedText;
    }

    function fetchFileContent(fileName) {
        console.log('请求文件内容：', fileName);
        // 如果当前是仅进度服务器，且有配置远端服务器，则从远端获取内容
        const contentUrl = SERVER_CONFIG.progressOnly && SERVER_CONFIG.remoteServerUrl 
            ? `${SERVER_CONFIG.remoteServerUrl}/file-content?name=` + encodeURIComponent(fileName)
            : '/file-content?name=' + encodeURIComponent(fileName);
        fetch(contentUrl)
            .then(response => {
                console.log('响应状态：', response.status);
                if (!response.ok) {
                    throw new Error('网络响应错误，状态码：' + response.status);
                }
                return response.text();
            })
            .then(text => {
                console.log('文件内容获取成功');
                
                // 保存原始文本以便切换模式时重新渲染
                const contentDiv = document.getElementById('content');
                contentDiv.setAttribute('data-original-text', text);
                
                // 使用新的预处理函数
                const processedText = preprocessText(text);

                console.log('开始渲染内容');
                parseMarkdownToHtml(processedText);
                checkAndSendMiddlePIndex();
            })
            .catch(error => {
                console.error('获取文件内容出错：', error);
                alert('无法获取文件内容，请检查控制台以获取更多信息。');
            });
    }

    function parseMarkdownToHtml(text) {
        console.log('正在执行 parseMarkdownToHtml 函数');
        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = ''; // 清空之前的内容

        if (typeof marked === 'undefined') {
            console.error('marked 库未定义');
            return;
        }

        const html = marked.parse(text);
        console.log('生成的 HTML 内容：', html);
        contentDiv.innerHTML = html;

        contentDiv.querySelectorAll('*').forEach((el, index) => {
            el.id = `${index + 1}`;
        });

        if (typeof renderMathInElement === 'undefined') {
            console.error('renderMathInElement 函数未定义');
            return;
        }
        
        renderMathInElement(contentDiv, {
            delimiters: [
                { left: "$$", right: "$$", display: true },
                { left: "$", right: "$", display: false },
                // 下面两行现在是备用，因为我们已经预处理为 $$
                { left: "\\[", right: "\\]", display: true },
                { left: "\\(", right: "\\)", display: false }
            ]
        });
        
        // 渲染完成后，如果是翻页模式则进行分页
        if (isPaginated) {
            setTimeout(() => {
                paginateContent();
            }, 100);
        }
    }
    
    // 估算元素行数（基于文本内容和样式）
    function estimateElementLines(el, lineHeight, contentWidth) {
        const style = window.getComputedStyle(el);
        const fontSize = parseFloat(style.fontSize) || 16;
        
        // 获取元素文本内容
        const text = el.textContent || '';
        const textLength = text.length;
        
        // 估算每行能容纳的字符数（根据字体大小）
        // 中文字符约等于字体大小，英文字符约字体大小的一半
        const avgCharWidth = fontSize * 0.6; // 平均字符宽度
        const charsPerLine = Math.floor(contentWidth / avgCharWidth);
        
        if (charsPerLine === 0) return 1;
        
        // 计算文本行数
        let textLines = Math.ceil(textLength / charsPerLine);
        
        // 根据元素类型添加额外行数（标题、段落间距等）
        const tagName = el.tagName.toLowerCase();
        let extraLines = 0;
        
        if (tagName.match(/^h[1-6]$/)) {
            // 标题占用更多行（字体更大）
            const level = parseInt(tagName[1]);
            extraLines = 4 - level; // h1 多3行，h6 多0行
        } else if (tagName === 'p') {
            // 段落间距
            const marginBottom = parseFloat(style.marginBottom) || 0;
            extraLines = Math.ceil(marginBottom / lineHeight);
        }
        
        // 图片、代码块等固定高度元素
        if (tagName === 'img' || tagName === 'pre' || tagName === 'blockquote' || tagName === 'table') {
            const height = el.getBoundingClientRect().height || (fontSize * 3);
            textLines = Math.ceil(height / lineHeight);
        }
        
        return Math.max(1, textLines + extraLines);
    }
    
    // 分页功能 - 按行数计算
    function paginateContent() {
        const contentDiv = document.getElementById('content');
        const elements = Array.from(contentDiv.children);
        
        if (elements.length === 0) return;
        
        // 获取样式参数
        const computedStyle = window.getComputedStyle(contentDiv);
        const fontSize = parseFloat(computedStyle.fontSize) || 16;
        const lineHeight = parseFloat(computedStyle.lineHeight) || (fontSize * 1.6);
        const contentWidth = contentDiv.clientWidth - 40; // 减去内边距
        
        // 计算每页行数（视口高度减去边距，再除以行高）
        const pageHeight = window.innerHeight - 120; // 减去顶部和底部边距
        const linesPerPage = Math.max(5, Math.floor(pageHeight / lineHeight));
        
        console.log('分页参数:', { fontSize, lineHeight, pageHeight, linesPerPage, contentWidth });
        
        // 先计算所有元素的行数
        const elementsWithLines = elements.map(el => ({
            el: el.cloneNode(true),
            lines: estimateElementLines(el, lineHeight, contentWidth)
        }));
        
        // 保存原始内容
        contentDiv.innerHTML = '';
        contentDiv.classList.add('paginated');
        
        pages = [];
        let currentPageDiv = document.createElement('div');
        currentPageDiv.className = 'page active';
        contentDiv.appendChild(currentPageDiv);
        
        let currentPageLines = 0;
        
        elementsWithLines.forEach(({ el, lines }) => {
            // 如果当前页为空，直接添加
            if (currentPageLines === 0) {
                currentPageDiv.appendChild(el);
                currentPageLines += lines;
            }
            // 如果添加后不超过行数限制，添加
            else if (currentPageLines + lines <= linesPerPage) {
                currentPageDiv.appendChild(el);
                currentPageLines += lines;
            }
            // 否则创建新页面
            else {
                currentPageDiv = document.createElement('div');
                currentPageDiv.className = 'page';
                contentDiv.appendChild(currentPageDiv);
                
                currentPageDiv.appendChild(el);
                currentPageLines = lines;
            }
        });
        
        pages = contentDiv.querySelectorAll('.page');
        totalPages = pages.length;
        
        console.log('分页完成，总页数:', totalPages);
        
        // 显示分页控制
        const pageControls = document.getElementById('pageControls');
        pageControls.style.display = 'flex';
        
        // 更新页码显示
        currentPage = 1;
        updatePageInfo();
        updatePageButtons();
        showPage(1);
        
        // 恢复阅读进度
        restorePaginatedProgress();
    }
    
    // 显示指定页面
    function showPage(pageNum) {
        if (pageNum < 1 || pageNum > totalPages) return;
        
        pages.forEach((page, index) => {
            if (index === pageNum - 1) {
                page.classList.add('active');
            } else {
                page.classList.remove('active');
            }
        });
    }
    
    // 切换到指定页面
    function goToPage(pageNum) {
        if (pageNum < 1 || pageNum > totalPages) return;
        
        currentPage = pageNum;
        showPage(currentPage);
        updatePageInfo();
        updatePageButtons();
        
        // 保存阅读进度（页码）
        savePaginatedProgress();
    }
    
    // 下一页
    function nextPage() {
        if (currentPage < totalPages) {
            goToPage(currentPage + 1);
        }
    }
    
    // 上一页
    function prevPage() {
        if (currentPage > 1) {
            goToPage(currentPage - 1);
        }
    }
    
    // 更新页码显示
    function updatePageInfo() {
        document.getElementById('pageInfo').textContent = `${currentPage} / ${totalPages}`;
    }
    
    // 更新按钮状态
    function updatePageButtons() {
        document.getElementById('prevPage').disabled = currentPage === 1;
        document.getElementById('nextPage').disabled = currentPage === totalPages;
    }
    
    // 切换阅读模式
    function toggleReadingMode() {
        isPaginated = !isPaginated;
        localStorage.setItem('readingMode', isPaginated ? 'paginated' : 'scroll');
        
        const contentDiv = document.getElementById('content');
        const pageControls = document.getElementById('pageControls');
        const modeToggle = document.getElementById('modeToggle');
        
        if (isPaginated) {
            // 切换到翻页模式
            modeToggle.title = '切换为滚动模式';
            paginateContent();
        } else {
            // 切换到滚动模式
            modeToggle.title = '切换为翻页模式';
            contentDiv.classList.remove('paginated');
            pageControls.style.display = 'none';
            
            // 重新渲染原始内容
            const text = contentDiv.getAttribute('data-original-text') || '';
            if (text) {
                const processedText = preprocessText(text);
                parseMarkdownToHtmlSimple(processedText);
            }
        }
    }
    
    // 简化的渲染（用于切换回滚动模式）
    function parseMarkdownToHtmlSimple(text) {
        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = '';
        
        const html = marked.parse(text);
        contentDiv.innerHTML = html;
        
        contentDiv.querySelectorAll('*').forEach((el, index) => {
            el.id = `${index + 1}`;
        });
        
        renderMathInElement(contentDiv, {
            delimiters: [
                { left: "$$", right: "$$", display: true },
                { left: "$", right: "$", display: false },
                { left: "\\[", right: "\\]", display: true },
                { left: "\\(", right: "\\)", display: false }
            ]
        });
    }
    
    // 保存翻页进度
    function savePaginatedProgress() {
        const progressData = {
            mode: 'paginated',
            page: currentPage,
            timestamp: Date.now()
        };
        localStorage.setItem(`progress_${fileName}`, JSON.stringify(progressData));
    }
    
    // 恢复翻页进度
    function restorePaginatedProgress() {
        try {
            const saved = localStorage.getItem(`progress_${fileName}`);
            if (saved) {
                const data = JSON.parse(saved);
                if (data.mode === 'paginated' && data.page && data.page <= totalPages) {
                    goToPage(data.page);
                    return;
                }
            }
        } catch (e) {
            console.error('恢复翻页进度失败:', e);
        }
        goToPage(1);
    }

    // -------------------------------------------------------------
    // 以下是您用于记录阅读位置的代码，保持不变
    // -------------------------------------------------------------
    import { getMiddlePIndex } from './recLoc.js';

    let firstLoad = true;

    // 从服务器获取阅读进度
    async function fetchReadingProgress() {
        try {
            // 优先从本地获取，如果本地没有或本地是仅进度服务器且有远端配置，则从远端获取
            const progressUrl = SERVER_CONFIG.progressOnly && SERVER_CONFIG.remoteServerUrl
                ? `${SERVER_CONFIG.remoteServerUrl}/get-progress?name=` + encodeURIComponent(fileName)
                : '/get-progress?name=' + encodeURIComponent(fileName);
            
            const response = await fetch(progressUrl);
            if (response.ok) {
                const data = await response.json();
                console.log('获取到的阅读进度:', data);
                if (data.progress !== null && data.progress !== undefined) {
                    return data.progress;
                }
            }
        } catch (error) {
            console.error('获取阅读进度失败:', error);
        }
        return null;
    }

    function checkAndSendMiddlePIndex() {
        // 翻页模式下不发送滚动进度，而是保存页码
        if (isPaginated) {
            if (firstLoad) {
                firstLoad = false;
                // 翻页模式的恢复在 paginateContent 中处理
            }
            return;
        }
        
        const middlePIndex = getMiddlePIndex();

        if (middlePIndex === null) return; // 如果没有p元素，则不发送请求

        console.log(fileName, "当前中间的 p 是第", middlePIndex, "个");

        // 发送进度到当前服务器（保存进度）
        fetch('/log-middle-p-index', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                fileName: fileName,
                middlePIndex: middlePIndex
            })
        })
        .then(response => response.json())
        .then(async data => {
            console.log('服务器响应:', data);

            if (firstLoad) {
                firstLoad = false;
                // 优先使用从 /get-progress 获取的进度，如果没有则使用当前响应中的值
                const savedProgress = await fetchReadingProgress();
                const targetIndex = savedProgress !== null ? savedProgress : data.maxValue;
                
                if (targetIndex) {
                    const targetElement = document.getElementById(targetIndex);
                    if (targetElement) {
                        targetElement.scrollIntoView({ behavior: 'auto', block: 'center' });
                    }
                }
            }
        })
        .catch(error => console.error('发送数据失败:', error));
    }

    // 页面加载后等待DOM渲染完成再执行首次检查
    document.addEventListener('DOMContentLoaded', () => {
            // 首次滚动定位需要一点延迟，确保所有内容（特别是KaTeX）渲染完毕
        setTimeout(() => {
            // 首次加载时，我们只关心滚动到上次的位置，不发送新位置
            // checkAndSendMiddlePIndex 会处理这个逻辑
        }, 500);
    });

    // 每 3 秒执行一次
    setInterval(checkAndSendMiddlePIndex, 3000);

    function forceUpdateMiddlePIndex() {
        // 翻页模式下保存页码
        if (isPaginated) {
            savePaginatedProgress();
            showToast(`已保存到第 ${currentPage} 页`);
            return;
        }
        
        const middlePIndex = getMiddlePIndex();

        if (middlePIndex === null) return; // 如果没有p元素，则不发送请求

        console.log(fileName, "强制更新中间的 p 是第", middlePIndex, "个");

        fetch('/log-middle-p-index', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                fileName: fileName,
                middlePIndex: middlePIndex,
                force: true
            })
        })
        .then(response => response.json())
        .then(data => {
            console.log('服务器响应:', data);
            showToast('位置已更新');
        })
        .catch(error => console.error('发送数据失败:', error));
    }

    document.getElementById('forceUpdateButton').addEventListener('click', forceUpdateMiddlePIndex);

    function showToast(message, duration = 2000) {
        const toast = document.createElement('div');
        toast.className = 'custom-toast';
        toast.innerText = message;

        document.body.appendChild(toast);

        // 淡入
        setTimeout(() => {
            toast.style.opacity = '1';
            toast.style.transform = 'translateY(0)';
        }, 10);

        // 淡出并删除
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(-10px)';
            setTimeout(() => toast.remove(), 300);
        }, duration);
    }
</script>
    
    
</body>
</html>
